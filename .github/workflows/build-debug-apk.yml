name: Build Debug APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install native build deps (termux-x11)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq bison cmake ninja-build

      - name: Setup termux-x11 native module
        run: bash scripts/setup-x11-module.sh

      - name: Fetch proot runtime
        run: bash scripts/fetch-proot-runtime.sh

      - name: Fetch Termux bootstrap (optional, ~100MB)
        run: bash scripts/fetch-termux-bootstrap.sh
        continue-on-error: true

      - name: Build link shim
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq gcc-aarch64-linux-gnu
          bash scripts/build-linkshim.sh

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace
        timeout-minutes: 90

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: proot-cowork-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: APK info
        run: |
          ls -lh app/build/outputs/apk/debug/
          echo "APK built successfully"
