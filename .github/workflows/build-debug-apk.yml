name: Build Debug APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Termux stack (x11 + terminal modules)
        run: bash scripts/setup-termux-stack.sh

      - name: Verify termux-x11 embed patches
        run: grep -q COWORK_TRIGGER_CALLBACK_NULL third_party/termux-x11/app/src/main/java/com/termux/x11/LorieView.java

      - name: Fetch UserLAnd runtime
        run: bash scripts/fetch-userland-runtime.sh

      - name: Prepare Termux bootstrap asset
        run: bash scripts/prepare-termux-bootstrap.sh

      - name: Set up QEMU for arm64 Docker
        uses: docker/setup-qemu-action@v3

      - name: Build bundled Ubuntu + XFCE container
        run: bash scripts/build-ubuntu-xfce-container.sh
        timeout-minutes: 120

      - name: Verify Ubuntu container asset
        run: test -f app/src/main/assets/ubuntu-xfce-container.tar.gz

      - name: Verify Termux bash is bundled
        run: test -f app/src/main/jniLibs/arm64-v8a/libbash.so

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace
        timeout-minutes: 90

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: proot-cowork-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: APK info
        run: |
          ls -lh app/build/outputs/apk/debug/
          echo "APK built successfully"
