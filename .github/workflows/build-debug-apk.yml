name: Build Debug APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache termux-x11 checkout
        uses: actions/cache@v4
        with:
          path: third_party/termux-x11
          key: termux-x11-phoshdroid-${{ hashFiles('scripts/setup-termux-stack.sh', 'scripts/patch-termux-x11-embed.sh') }}
          restore-keys: |
            termux-x11-phoshdroid-

      - name: Setup Termux stack (x11 + terminal modules)
        run: bash scripts/setup-termux-stack.sh
        env:
          TERMUX_STACK_CLONE_ATTEMPTS: 8
          TERMUX_STACK_RETRY_DELAY_SEC: 60

      - name: Verify termux-x11 embed patches
        run: grep -q COWORK_TRIGGER_CALLBACK_NULL third_party/termux-x11/app/src/main/java/com/termux/x11/LorieView.java

      - name: Fetch UserLAnd runtime
        run: bash scripts/fetch-userland-runtime.sh

      - name: Prepare Termux bootstrap asset
        run: bash scripts/prepare-termux-bootstrap.sh

      - name: Verify Termux bash is bundled
        run: test -f app/src/main/jniLibs/arm64-v8a/libbash.so

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace
        timeout-minutes: 60

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: proot-cowork-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: APK info
        run: |
          ls -lh app/build/outputs/apk/debug/
          echo "APK built successfully"
